<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="anydocs-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Rounded Rect Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#anydocs-gradient)" />
  
  <!-- Logo Content -->
  <g transform="translate(512, 512) scale(20)">
    <path d="M0 -15L-12 12H-6L0 -1.5L6 12H12L0 -15Z" fill="white" />
    <circle cx="0" cy="-1.5" r="2.5" fill="white" />
    <path d="M0 -1.5L-3 4.5H3L0 -1.5Z" fill="white" fill-opacity="0.3" />
  </g>
  
  <!-- Subtle Shimmer/Blink Element -->
  <circle cx="512" cy="482" r="100" fill="white" fill-opacity="0.1" filter="url(#glow)" />
</svg>
