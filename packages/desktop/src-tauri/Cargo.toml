[package]
name = "anydocs-desktop"
version = "1.0.0"
edition = "2021"
build = "build.rs"

[lib]
name = "anydocs_desktop"
crate-type = ["staticlib", "cdylib", "rlib"]

[dependencies]
rfd = "0.15"
serde = { version = "1", features = ["derive"] }
tauri = { version = "2", features = [] }

[build-dependencies]
tauri-build = { version = "2", features = [] }
